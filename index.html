<html>

<head>
  <style>
    body{
      font-family: 'Comic Sans MS';
    }
  </style>
  <title>Try hard snake!!</title>
</head>

<body>
  <canvas style="border: 1px solid black;" id="playground" width="400" height="400">
  </canvas>
  <h4> Score: <span id="scoreSpan"> 0 </span></h4>
  <button onClick="window.location.reload();">Try again</button>
  <br/>
  <small>To play use the arrow keys of your keyboard</small>
</body>

<script>

  var scoreLabelElement =document.getElementById('scoreSpan');
  var canvas = document.getElementById("playground");
  var ctx = canvas.getContext('2d');
  var speed = 50;
  var scoreSpeed = 3;
  var direction = {
    coordinates:[1, 0],
    orientation: "right"
  } // defaults right
  var snakeFood = []
  var currentScore = 0;
  var snake = [
    [2, 0],
    [1, 0],
    [0, 0],
  ];
  ctx.scale(10, 10);
  document.addEventListener("keydown", function (e) {
    if (e.which == 38  && direction.orientation != "down") { // up
      direction.coordinates = [0, -1]
      direction.orientation = 'up'
    }  if (e.which == 40 && direction.orientation != "up") { //down
      direction.coordinates = [0, 1]
      direction.orientation = 'down'
    }  if (e.which == 39  && direction.orientation != "left") { //right
      direction.coordinates = [1, 0]
      direction.orientation = 'right'
    }  if (e.which == 37  && direction.orientation != "right") { // left
      direction.coordinates = [-1, 0]
      direction.orientation = 'left'
    }
  })

  function generateFood() {
    let newX = Math.round(Math.random() * 39)
    let newY = Math.round(Math.random() * 39)

    if(snake.find(([x,y])=> x == newX && y == newY)){
      generateFood()
    }else{
      snakeFood = [newX, newY]
    }

  }

  function defeat() {
    clearInterval(game);
    ctx.clearRect(0, 0, 400, 400);
    ctx.font = "6px Comic Sans MS";
    var gradient = ctx.createLinearGradient(0, 0, 20, 20);
    gradient.addColorStop(0, "rgb(255, 0, 0)");
    gradient.addColorStop(1, "rgb(255, 255, 0)");
    ctx.fillStyle = gradient;
    ctx.textAlign = "center";
    ctx.fillText("You lose :(", 20, 20);
  }

  function print() {
    ctx.clearRect(0, 0, 400, 400);
    ctx.fillStyle = "red"

    ctx.fillRect(snakeFood[0], snakeFood[1], 1, 1)
    ctx.fillStyle = "black"

    snake.forEach(([x, y]) => {
      ctx.fillRect(x, y, 1, 1)
    })
  }

  generateFood();
  print();
  var game = setInterval(() => {
    const currentX = snake[0][0] + direction.coordinates[0];
    const currentY = snake[0][1] + direction.coordinates[1];
    if(snake.find(([x,y])=> x == currentX && y == currentY)){
      return defeat();
    }
    if((currentX > 39 || currentX < 0)|| (currentY> 39 || currentY < 0)){
        return defeat()
    }

    snake.unshift([currentX, currentY])

    if (currentX == snakeFood[0] && currentY == snakeFood[1]) {
      generateFood()
      currentScore++;
      scoreLabelElement.textContent = currentScore;

      if(currentScore % scoreSpeed == 0 && speed > 0){
        speed -= Math.floor(currentScore / scoreSpeed)
      }
    } else {
      snake.pop()
    }
    console.log(speed)
    print();
  }, speed);


</script>

</html>
